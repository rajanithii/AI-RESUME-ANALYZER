<nav class="app-navbar">
  <div class="nav-brand">
    <a href="/dashboard" style="display:flex;align-items:center;gap:10px;text-decoration:none">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M13 1L24 7V19L13 25L2 19V7L13 1Z" stroke="url(#nav_g)" stroke-width="1.5" fill="rgba(110,231,247,0.08)"/>
        <circle cx="13" cy="13" r="3.5" fill="url(#nav_g)"/>
        <defs><linearGradient id="nav_g" x1="2" y1="1" x2="24" y2="25"><stop stop-color="#6EE7F7"/><stop offset="1" stop-color="#A78BFA"/></linearGradient></defs>
      </svg>
      <span class="brand-name">ResumeAI</span>
    </a>
  </div>

  <div class="app-nav-links">
    <a href="/dashboard" class="anl {% if request.endpoint == 'dashboard' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="9" y="9" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
      Dashboard
    </a>
    <a href="/upload" class="anl {% if request.endpoint in ['upload','result'] %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v9M4 6l4 4 4-4M1 12v1.5A1.5 1.5 0 002.5 15h11A1.5 1.5 0 0015 13.5V12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Analyze
    </a>
    <a href="/profile" class="anl {% if request.endpoint == 'profile' %}active{% endif %}">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      Profile
    </a>
  </div>

  <!-- Profile button -->
  <button class="nav-profile-btn" id="profileBtn" title="Your profile">
    <div class="nav-avatar">{{ initials }}</div>
    <div class="nav-user-info">
      <div class="nav-user-name">{{ profile.full_name.split()[0] if profile and profile.full_name else user.username }}</div>
      <div class="nav-user-email">{{ user.email }}</div>
    </div>
    <svg class="nav-chevron" width="12" height="12" viewBox="0 0 12 12" fill="none">
      <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
</nav>
